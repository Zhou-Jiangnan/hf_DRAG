data:
  load:
    path: hotpotqa/hotpot_qa
    name: distractor
    split: train
  # task_type: mcqa for Multiple Choice Question Answering; ogqa for Open Generative Question Answering
  task_type: ogqa
  # HotpotQA has no stable high-level topic field, use a constant topic for DRAG partitioning.
  topic_path: __const__:multi_hop_qa
  question_path: question
  answer_path: answer
  num_samples: 10000
